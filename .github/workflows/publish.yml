name: Publish to ClawHub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Publish skill bundle
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish . --slug ecommerce-ops-suite --tags "ecommerce,automation,competitive-analysis"

      - name: Publish individual skills
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish competitive-monitor --slug ecommerce-competitive-monitor --tags "ecommerce,competitor,monitoring"
          clawhub publish social-poster --slug ecommerce-social-poster --tags "ecommerce,social-media,automation"
          clawhub publish analytics-dashboard --slug ecommerce-analytics-dashboard --tags "ecommerce,analytics,dashboard"
