name: Publish to ClawHub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Publish ecommerce-competitive-monitor (paid)
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish ecommerce-competitive-monitor \
            --slug ecommerce-competitive-monitor \
            --name "E-commerce Competitive Monitor" \
            --tags "ecommerce,competitor-analysis,price-monitoring" \
            --changelog "Initial release - competitor monitoring"

      - name: Publish ecommerce-social-poster (free)
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish ecommerce-social-poster \
            --slug ecommerce-social-poster \
            --name "E-commerce Social Poster" \
            --tags "ecommerce,social-media,content-generation" \
            --changelog "Initial release - social media content"

      - name: Publish ecommerce-analytics-dashboard (free)
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish ecommerce-analytics-dashboard \
            --slug ecommerce-analytics-dashboard \
            --name "E-commerce Analytics Dashboard" \
            --tags "ecommerce,analytics,kpi-tracking" \
            --changelog "Initial release - analytics dashboard"

      - name: Publish ecommerce-email-automation (free)
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish ecommerce-email-automation \
            --slug ecommerce-email-automation \
            --name "E-commerce Email Automation" \
            --tags "ecommerce,email-marketing,automation" \
            --changelog "Initial release - email automation sequences"

      - name: Publish ecommerce-inventory-tracker (free)
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish ecommerce-inventory-tracker \
            --slug ecommerce-inventory-tracker \
            --name "E-commerce Inventory Tracker" \
            --tags "ecommerce,inventory,stock-management" \
            --changelog "Initial release - inventory tracking"
